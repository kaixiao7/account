  enable-stdout: true

db:
  file: ./account.db            # sqlite数据库文件的位置
  max-idle-connections: 10      # 最大空闲连接数
  max-open-connections: 10      # 最大打开连接数
  max-connection-life-time: 30  # 空闲连接最大存活时间 30s
run_mod: debug
port: :8080
jwt:
  secret: RtgYsliaukijq8s2l9p3a4UQBb7 # jwt签名密钥
  expire: 2                           # token过期时间，单位：小时
  refresh-token: 7                    # refreshToken过期时间，单位：天

log:
  level: debug
  path: "./logs"
